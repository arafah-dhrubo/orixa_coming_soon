<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="ORIXA — Coming Soon">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f4f7ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#cbd5ff" flood-opacity="0.6" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Card -->
  <g transform="translate(60,60)">
    <rect width="1080" height="510" rx="24" fill="#fff" filter="url(#shadow)" />

    <!-- Left column: logo + title -->
    <g transform="translate(64,48)">
      <!-- Logo (uses embedded svg file if present) -->
      <image href="/orixa_logo_official.svg" width="96" height="96" x="0" y="0" />

      <!-- Title -->
      <text x="120" y="42" font-family="Roboto, Arial, sans-serif" font-size="42" font-weight="700" fill="#0b1220">ORIXA</text>

      <text x="0" y="140" font-family="Roboto, Arial, sans-serif" font-size="36" font-weight="700" fill="#0b1220">Launching Soon</text>

      <text x="0" y="190" font-family="Roboto, Arial, sans-serif" font-size="20" fill="#475569">High-performance websites, apps & software</text>
    </g>

    <!-- Right column: visual placeholder -->
    <g transform="translate(640,48)">
      <rect width="320" height="320" rx="12" fill="#eef2ff" />
      <g transform="translate(40,40)">
        <rect width="240" height="240" rx="8" fill="#e6eefc" />
        <text x="120" y="130" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="20" fill="#94a3b8">ORIXA</text>
      </g>
    </g>

    <!-- Footer line -->
    <text x="64" y="470" font-family="Roboto, Arial, sans-serif" font-size="16" fill="#64748b">orixa.example — Launching June 2026</text>
  </g>
</svg>
